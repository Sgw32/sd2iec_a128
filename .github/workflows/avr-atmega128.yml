name: AVR atmega128 Build

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-atmega128:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-avr binutils-avr avr-libc make perl

      - name: Prepare build scripts
        run: |
          chmod +x scripts/configparser.pl scripts/gcctest.pl scripts/avr/crcgen-avr.pl

      - name: Build firmware (pvgSD / atmega128)
        run: |
          make clean CONFIG=configs/config-pvgSD
          make CONFIG=configs/config-pvgSD

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sd2iec-atmega128-${{ github.sha }}
          if-no-files-found: error
          path: |
            obj-m128-pvgSD/sd2iec.elf
            obj-m128-pvgSD/sd2iec.hex
            obj-m128-pvgSD/sd2iec.bin
            obj-m128-pvgSD/sd2iec.eep
            obj-m128-pvgSD/sd2iec.map
            obj-m128-pvgSD/sd2iec.lss
            obj-m128-pvgSD/sd2iec.sym
